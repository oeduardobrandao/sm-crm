name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck CRM
        run: npx tsc -p apps/crm/tsconfig.json --noEmit

      - name: Typecheck Hub
        run: npx tsc -p apps/hub/tsconfig.json --noEmit

      - name: Typecheck Admin
        run: npx tsc -p apps/admin/tsconfig.json --noEmit

      - name: Tests with coverage
        run: npm run test:coverage

  e2e:
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    timeout-minutes: 15
    env:
      E2E_CRM_EMAIL: ${{ secrets.E2E_CRM_EMAIL }}
      E2E_CRM_PASSWORD: ${{ secrets.E2E_CRM_PASSWORD }}
      E2E_HUB_PATH: ${{ secrets.E2E_HUB_PATH }}
      CRM_BASE_URL: ${{ secrets.CRM_BASE_URL }}
      HUB_BASE_URL: ${{ secrets.HUB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.E2E_CRM_EMAIL != '' }}

      - uses: actions/setup-node@v4
        if: ${{ env.E2E_CRM_EMAIL != '' }}
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: ${{ env.E2E_CRM_EMAIL != '' }}

      - name: Install Playwright browsers
        if: ${{ env.E2E_CRM_EMAIL != '' }}
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        if: ${{ env.E2E_CRM_EMAIL != '' }}
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && env.E2E_CRM_EMAIL != '' }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
