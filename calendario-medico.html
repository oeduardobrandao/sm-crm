<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Médico — Brasil & Mundial</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #12151a;
    --border: #1e2430;
    --text: #e8eaf0;
    --muted: #5a6070;
    --accent: #c8f542;
    --accent2: #42c8f5;
    --accent3: #f5a342;
    --red: #f55a42;
    --pink: #f542c8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 3rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .header-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .header-title h1 span {
    color: var(--accent);
  }

  .header-title p {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .legend {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .controls {
    padding: 1.5rem 3rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 0.4rem 1rem;
    border-radius: 2px;
    outline: none;
    width: 240px;
    transition: border-color 0.2s;
    margin-left: auto;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  main {
    padding: 2rem 3rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  .month-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .month-card:hover {
    border-color: #2e3540;
  }

  .month-header {
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .month-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
  }

  .month-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .month-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    background: #1a2a10;
    color: var(--accent);
    border: 1px solid #2a4018;
    white-space: nowrap;
  }

  .month-events {
    padding: 0.5rem 0;
  }

  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    padding: 0.6rem 1.5rem;
    transition: background 0.15s;
    cursor: default;
  }

  .event-item:hover {
    background: rgba(255,255,255,0.02);
  }

  .event-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    min-width: 52px;
    line-height: 1.6;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .event-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .event-name {
    font-size: 0.82rem;
    line-height: 1.5;
    color: #c0c8d8;
  }

  .type-br   { background: var(--accent); }
  .type-world { background: var(--accent2); }
  .type-prof  { background: var(--accent3); }
  .type-week  { background: var(--pink); }
  .type-month { background: var(--red); }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .count-bar {
    padding: 0.6rem 3rem;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .count-bar span { color: var(--accent); }

  @media (max-width: 700px) {
    header, main, .controls, .count-bar { padding-left: 1.2rem; padding-right: 1.2rem; }
    .search-input { width: 100%; margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Calendário <span>Médico</span></h1>
    <p>Brasil &amp; Mundial — Datas de Saúde &amp; Conscientização</p>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Brasil</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div>Mundial / OMS / OPAS</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div>Profissões</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div>Semanas</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Meses temáticos</div>
  </div>
</header>

<div class="controls" id="controls">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="br">🇧🇷 Brasil</button>
  <button class="filter-btn" data-filter="world">🌍 Mundial</button>
  <button class="filter-btn" data-filter="cancer">Câncer</button>
  <button class="filter-btn" data-filter="saude-mental">Saúde Mental</button>
  <button class="filter-btn" data-filter="cardio">Cardio/Vascular</button>
  <button class="filter-btn" data-filter="infeccao">Infecções</button>
  <button class="filter-btn" data-filter="prof">Profissões</button>
  <input class="search-input" id="search" type="text" placeholder="Buscar data ou condição…">
</div>

<div class="count-bar" id="countBar"></div>

<main id="main"></main>

const dotClass = { br: "type-br", world: "type-world", prof: "type-prof", week: "type-week", month: "type-month" };
let activeFilter = "all";
let searchTerm = "";

function render() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  let totalVisible = 0;

  data.forEach(month => {
    const filtered = month.events.filter(e => {
      const matchFilter = activeFilter === "all" || e.tags.includes(activeFilter);
      const matchSearch = !searchTerm || e.name.toLowerCase().includes(searchTerm.toLowerCase()) || e.date.toLowerCase().includes(searchTerm.toLowerCase());
      return matchFilter && matchSearch;
    });

    if (filtered.length === 0) return;
    totalVisible += filtered.length;

    const card = document.createElement("div");
    card.className = "month-card";

    card.innerHTML = `
      <div class="month-header">
        <div>
          <div class="month-name">${month.month}</div>
          <div class="month-num">${month.num}</div>
        </div>
        ${month.badge ? `<div class="month-badge">${month.badge}</div>` : ""}
      </div>
      <div class="month-events">
        ${filtered.map(e => `
          <div class="event-item">
            <div class="event-date">${e.date}</div>
            <div class="event-dot ${dotClass[e.type] || 'type-world'}"></div>
            <div class="event-name">${e.name}</div>
          </div>
        `).join("")}
      </div>
    `;
    main.appendChild(card);
  });

  if (totalVisible === 0) {
    main.innerHTML = `<div class="no-results">Nenhuma data encontrada para "${searchTerm}"</div>`;
  }

  document.getElementById("countBar").innerHTML = `<span>${totalVisible}</span> datas exibidas`;
}

document.getElementById("controls").addEventListener("click", e => {
  if (e.target.classList.contains("filter-btn")) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    activeFilter = e.target.dataset.filter;
    render();
  }
});

document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value;
  render();
});

render();
</script>
